# ============================================================
# Nginx reverse proxy para Odoo 18 — Producción
# Dominio: odoo-das-g4.westus3.cloudapp.azure.com
# ============================================================

client_max_body_size 200m;

upstream odoo_prod {
    server odoo18-prod:8069;
    keepalive 32;
}

upstream odoo_prod_longpolling {
    server odoo18-prod:8072;
}

# ── HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    server_name odoo-das-g4.westus3.cloudapp.azure.com;

    # Ruta para el challenge de Let's Encrypt (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name odoo-das-g4.westus3.cloudapp.azure.com;

    ssl_certificate     /etc/letsencrypt/live/odoo-das-g4.westus3.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odoo-das-g4.westus3.cloudapp.azure.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /var/log/nginx/odoo_access.log;
    error_log  /var/log/nginx/odoo_error.log;

    location / {
        proxy_pass http://odoo_prod;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout    720s;
        proxy_redirect        off;
    }

    # Longpolling — necesario con workers > 0
    location /longpolling {
        proxy_pass http://odoo_prod_longpolling;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache de assets estáticos
    location ~* /web/static/ {
        proxy_pass         http://odoo_prod;
        proxy_cache_valid  200 90m;
        proxy_buffering    on;
        expires            864000;
        add_header         Cache-Control "public, immutable";
    }
}
