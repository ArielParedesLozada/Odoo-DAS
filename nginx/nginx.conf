# ============================================================
# Nginx reverse proxy para Odoo 18 — Producción y Staging
# Reemplaza DOMINIO.COM con tu dominio real antes de usar
# ============================================================

# Tamaño máximo de upload para adjuntos de Odoo (facturas, documentos)
client_max_body_size 200m;

# ── Upstream: producción ─────────────────────────────────────
upstream odoo_prod {
    server odoo18-prod:8069;
    keepalive 32;
}

upstream odoo_prod_longpolling {
    server odoo18-prod:8072;
}

# ── Upstream: staging ────────────────────────────────────────
upstream odoo_staging {
    server odoo18-staging:8069;
    keepalive 32;
}

upstream odoo_staging_longpolling {
    server odoo18-staging:8072;
}

# ── Redirigir HTTP → HTTPS (ambos subdominios) ───────────────
server {
    listen 80;
    server_name odoo.DOMINIO.COM staging.DOMINIO.COM;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Producción: odoo.DOMINIO.COM ─────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name odoo.DOMINIO.COM;

    ssl_certificate     /etc/letsencrypt/live/odoo.DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odoo.DOMINIO.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logs separados por entorno
    access_log /var/log/nginx/odoo_prod_access.log;
    error_log  /var/log/nginx/odoo_prod_error.log;

    # Proxy general
    location / {
        proxy_pass http://odoo_prod;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout    720s;

        # Necesario para Odoo proxy_mode = True
        proxy_redirect off;
    }

    # Longpolling (notificaciones en tiempo real de Odoo)
    location /longpolling {
        proxy_pass http://odoo_prod_longpolling;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache de assets estáticos
    location ~* /web/static/ {
        proxy_pass         http://odoo_prod;
        proxy_cache_valid  200 90m;
        proxy_buffering    on;
        expires            864000;
        add_header         Cache-Control "public, immutable";
    }

    # Bloquear acceso directo a xmlrpc desde exterior (seguridad)
    location /xmlrpc/2/common {
        deny all;
        return 403;
    }
}

# ── Staging: staging.DOMINIO.COM ─────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name staging.DOMINIO.COM;

    ssl_certificate     /etc/letsencrypt/live/staging.DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.DOMINIO.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Proteger staging con autenticación básica
    auth_basic           "Staging — Acceso restringido";
    auth_basic_user_file /etc/nginx/.htpasswd;

    access_log /var/log/nginx/odoo_staging_access.log;
    error_log  /var/log/nginx/odoo_staging_error.log;

    location / {
        proxy_pass http://odoo_staging;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout    720s;
        proxy_redirect        off;
    }

    location /longpolling {
        proxy_pass http://odoo_staging_longpolling;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* /web/static/ {
        proxy_pass http://odoo_staging;
        expires    3600;
    }
}
