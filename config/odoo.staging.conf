[options]
# ── Addons ──────────────────────────────────────────────────
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# ── Datos ───────────────────────────────────────────────────
data_dir = /var/lib/odoo

# ── Seguridad ────────────────────────────────────────────────
admin_passwd = CAMBIAR_POR_HASH_DISTINTO_AL_DE_PROD
dbfilter = ^%d$
list_db = False

# ── Proxy reverso ────────────────────────────────────────────
proxy_mode = True

# ── Performance (staging comparte VM, menos workers) ─────────
workers = 2
max_cron_threads = 1
limit_memory_hard = 1342177280
limit_memory_soft = 1073741824
limit_time_cpu = 300
limit_time_real = 600

# ── Logging (staging puede ser más verbose) ──────────────────
log_level = info
logrotate = True
