[options]
# ── Addons ──────────────────────────────────────────────────
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# ── Datos ───────────────────────────────────────────────────
data_dir = /var/lib/odoo

# ── Base de datos (inyectadas por variables de entorno en prod) ─
; db_host = se inyecta vía env HOST
; db_port = 5432
; db_user = se inyecta vía env USER
; db_password = se inyecta vía env PASSWORD

# ── Seguridad ────────────────────────────────────────────────
# admin_passwd debe ser hash pbkdf2. Generar con:
#   python3 -c "from passlib.context import CryptContext; print(CryptContext(['pbkdf2_sha512']).hash('TU_PASSWORD'))"
admin_passwd = CAMBIAR_POR_HASH_PBKDF2

# Limitar bases de datos visibles al exterior
dbfilter = ^%d$
list_db = False

# ── Proxy reverso (Nginx) ────────────────────────────────────
proxy_mode = True

# ── Performance (ajustar según RAM de la VM) ─────────────────
# B2s (4 GB RAM): workers = 4
# B1s (1 GB RAM): workers = 2
workers = 4
max_cron_threads = 1

# Límites de memoria por worker (4 GB VM)
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192

# ── Logging ──────────────────────────────────────────────────
log_level = warn
logrotate = True
